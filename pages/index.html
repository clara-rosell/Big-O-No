<!DOCTYPE html>
<html>
<head>
<title>AccessiMap</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map {
height: 500px;
}
</style>
</head>
<body>

<div id="map"></div>

<script>
// Create map centered on Manchester
var map = L.map('map').setView([53.34785, 6.27576], 13);

// Add map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Add a marker
L.marker([53.4808, -2.2426]).addTo(map)
.bindPopup('Manchester')
.openPopup();
</script>

</body>
</html>
